<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">

    <g stroke="#A6C48A" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.08">

        <!-- Burger -->
        <g transform="translate(40 40)">
            <path d="M0 20 Q20 0 40 20"></path>
            <line x1="0" y1="24" x2="40" y2="24"></line>
            <path d="M3 32 H37"></path>
            <path d="M0 40 H40"></path>
            <circle cx="10" cy="12" r="1"></circle>
            <circle cx="20" cy="8" r="1"></circle>
            <circle cx="30" cy="12" r="1"></circle>
        </g>

        <!-- Pizza -->
        <g transform="translate(210 30)">
            <path d="M0 0 L50 25 L18 55 Z"></path>
            <circle cx="23" cy="23" r="3"></circle>
            <circle cx="18" cy="38" r="3"></circle>
            <circle cx="35" cy="28" r="3"></circle>
        </g>

        <!-- Croissant -->
        <g transform="translate(120 120)">
            <path d="M0 20
                     Q15 -5 30 20
                     Q25 30 15 35
                     Q5 30 0 20"></path>
            <path d="M7 20 Q15 10 23 20"></path>
        </g>

        <!-- Cupcake -->
        <g transform="translate(240 170)">
            <path d="M5 20
                     Q15 0 25 20
                     Q20 8 15 10
                     Q10 8 5 20"></path>
            <path d="M8 20 L22 20 L19 35 L11 35 Z"></path>
        </g>

        <!-- Cake -->
        <g transform="translate(55 190)">
            <path d="M0 30 H34"></path>
            <path d="M3 30 L6 10 H28 L31 30"></path>
            <circle cx="17" cy="6" r="2"></circle>
        </g>

        <!-- Leaf -->
        <g transform="translate(180 240)">
            <path d="M0 15
                     Q10 -5 25 10
                     Q15 25 0 15"></path>
            <line x1="4" y1="13" x2="20" y2="5"></line>
        </g>

        <!-- Small dots -->
        <circle cx="285" cy="275" r="2"></circle>
        <circle cx="70" cy="120" r="2"></circle>
        <circle cx="150" cy="290" r="2"></circle>

        <!-- Sparkles -->
        <g transform="translate(270 90)">
            <path d="M0 -6 L0 6"></path>
            <path d="M-6 0 L6 0"></path>
        </g>

        <g transform="translate(90 280)">
            <path d="M0 -5 L0 5"></path>
            <path d="M-5 0 L5 0"></path>
        </g>

    </g>

</svg>
